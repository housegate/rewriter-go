name: update-polyglot

# Weekly check for a new polyglot release; opens a bump PR when one exists.
# The PR carries the submodule gitlink + go.mod/go.sum changes only — the
# FFI rebuild and full test suite run in the PR's own ci workflow.
#
# NOTE: PRs opened with the default GITHUB_TOKEN do NOT trigger other
# workflows (GitHub's recursion guard), so the bump PR would show no CI.
# Set a POLYGLOT_BUMP_TOKEN repo secret (fine-grained PAT with contents:write
# + pull-requests:write on this repo) to get CI runs on the bump PRs.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.POLYGLOT_BUMP_TOKEN || github.token }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Detect latest release
        id: latest
        run: |
          git -C third_party/polyglot-src fetch --tags --quiet origin
          echo "tag=$(git -C third_party/polyglot-src tag --list 'v[0-9]*' --sort=-v:refname | head -1)" >> "$GITHUB_OUTPUT"

      - name: Bump submodule + go.mod
        id: bump
        run: |
          scripts/update-polyglot.sh --no-verify "${{ steps.latest.outputs.tag }}"
          if [ -n "$(git status --porcelain third_party/polyglot-src go.mod go.sum)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "already at ${{ steps.latest.outputs.tag }} — nothing to do"
          fi

      - name: Open PR
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.POLYGLOT_BUMP_TOKEN || github.token }}
          TAG: ${{ steps.latest.outputs.tag }}
        run: |
          branch="bot/polyglot-$TAG"
          if [ "$(gh pr list --head "$branch" --state open --json number --jq length)" != "0" ]; then
            echo "open PR for $branch already exists — skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add third_party/polyglot-src go.mod go.sum
          git commit -m "build: bump polyglot submodule to $TAG"
          git push -f origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "build: bump polyglot submodule to $TAG" \
            --body "$(printf 'Automated bump of the polyglot submodule to [%s](https://github.com/tobilg/polyglot/releases/tag/%s).\n\nGenerated by the `update-polyglot` workflow. The `ci` workflow on this PR builds the new FFI lib and runs the full test suite — merge only if it is green.' "$TAG" "$TAG")"
